<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pneuma Debug</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d0d1a;
            color: #e0e0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 12px 20px;
            background: #16213e;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }

        #header h1 { font-size: 16px; color: #7c83ff; font-weight: 600; }

        #session-info {
            color: #666;
            font-size: 11px;
            font-family: monospace;
        }

        #debug-panel {
            background: #0a0a1a;
            border-bottom: 1px solid #1a1a3a;
            padding: 8px 20px;
            font-family: monospace;
            font-size: 11px;
            color: #4a9eff;
            min-height: 24px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user {
            background: #1e2d5e;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #c8d3ff;
        }

        .message.assistant {
            background: #1a2a1a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            color: #d0f0d0;
        }

        .message.assistant.streaming::after {
            content: '▌';
            animation: blink 0.7s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .message-meta {
            font-size: 10px;
            color: #555;
            margin-top: 4px;
        }

        #input-area {
            padding: 16px 20px;
            background: #111122;
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        #message-input {
            flex: 1;
            background: #1a1a30;
            border: 1px solid #2a2a5a;
            border-radius: 8px;
            color: #e0e0f0;
            padding: 10px 14px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            outline: none;
            transition: border-color 0.2s;
        }

        #message-input:focus { border-color: #5060cc; }

        #send-btn {
            background: #4a50cc;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
            white-space: nowrap;
        }

        #send-btn:hover { background: #5a60dc; }
        #send-btn:disabled { background: #333; cursor: not-allowed; }

        #new-session-btn {
            background: transparent;
            color: #666;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }

        #new-session-btn:hover { border-color: #666; color: #aaa; }

        .memory-indicator {
            font-size: 10px;
            color: #4a9eff;
            padding: 2px 6px;
            background: #0a1a2a;
            border-radius: 4px;
            border: 1px solid #1a3a5a;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>⚡ Pneuma Debug Chat</h1>
        <div style="display:flex; gap:10px; align-items:center">
            <button id="new-session-btn">Nowa sesja</button>
            <button id="importer-btn" style="background:transparent;color:#4a9eff;border:1px solid #2a3a5a;border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;">↑ Import</button>
            <div id="session-info">session: loading...</div>
        </div>
    </div>

    <div id="debug-panel">Intuicja: ready | Model: claude-sonnet-4-6</div>

    <div id="messages"></div>

    <div id="input-area">
        <textarea
            id="message-input"
            placeholder="Wpisz wiadomość... (Ctrl+Enter = wyślij)"
            rows="1"
        ></textarea>
        <button id="send-btn">Wyślij</button>
    </div>

    <script src="/chat.js"></script>
</body>
</html>
